name: lets-code

x-node: &node
  image: node:22
  working_dir: /app
  env_file: ../.env
  volumes:
    - ..:/app
    - node_modules:/app/node_modules

services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: app-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: please
      POSTGRES_DB: app_dev
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Install dependencies with a single writer to avoid write conflicts on the
  # shared node_modules volume.
  setup:
    <<: *node
    container_name: app-setup
    command: sh -c "corepack enable && pnpm install"

  app:
    <<: *node
    container_name: app-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://app:please@postgres:5432/app_dev
    command: sh -c "corepack enable && node server.js"
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully

  storybook:
    <<: *node
    container_name: app-storybook
    ports:
      - "6006:6006"
    environment:
      STORYBOOK_HOST: "0.0.0.0"
    command: sh -c "corepack enable && pnpm exec storybook dev -p 6006 --no-open"
    depends_on:
      setup:
        condition: service_completed_successfully

  test:
    build:
      dockerfile: docker/Dockerfile.test
      context: ..
    container_name: app-test
    working_dir: /app
    env_file: ../.env
    environment:
      DATABASE_URL: postgres://app:please@postgres:5432/app_test
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
    command: just check test
    depends_on:
      postgres:
        condition: service_healthy
      setup:
        condition: service_completed_successfully
    profiles:
      - test

volumes:
  postgres-data:
  node_modules:
